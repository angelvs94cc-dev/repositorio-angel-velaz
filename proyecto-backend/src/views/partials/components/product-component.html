<li class="list-group-item d-flex justify-content-between align-items-center">
    <span>
        <a href="/products/<%= product._id %>" class="text-decoration-none fw-bold">
            <%= product.name %>
        </a> 
        
        <span class="ms-2">
            <% product.tags.forEach(function(tag) { %>
                <span class="badge bg-info text-dark rounded-pill me-1" style="font-size: 0.75rem;">
                    <%= tag %>
                </span>
            <% }); %>
        </span>
    </span>

    <span class="badge bg-primary rounded-pill fs-6">
        <%= product.price %> €
    </span>
</li>
