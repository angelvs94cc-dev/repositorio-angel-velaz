<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - Wallapop</title>
  <link rel="stylesheet" href="./notifications/styles.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  
  <!-- Contenedor para mostrar si el login falló -->
  <section class="notifications-container"></section>

  <main style="max-width: 400px; margin: 50px auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px;">
    <h1>Entra en tu cuenta</h1>

    <form id="login-form">
      <div>
        <label for="email">Email</label><br>
        <input id="email" name="email" type="email" required placeholder="tu@email.com">
      </div>
      
      <br>

      <div>
        <label for="password">Contraseña</label><br>
        <input id="password" name="password" type="password" minlength="4" required placeholder="******">
      </div>

      <br>

      <button type="submit">Iniciar sesión</button>
    </form>

    <p style="margin-top: 20px;">
      ¿No tienes cuenta? <a href="signup.html">Regístrate aquí</a>
    </p>
    <p>
      <a href="index.html">Volver a la tienda</a>
    </p>
  </main>

  <script type="module" src="login.js"></script>

</body>
</html>
