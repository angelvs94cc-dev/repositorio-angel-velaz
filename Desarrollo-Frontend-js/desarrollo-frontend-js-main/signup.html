<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - Wallapop</title>
  <link rel="stylesheet" href="./notifications/styles.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  
  <!-- Contenedor para avisar si el email ya existe o las contraseñas no coinciden -->
  <section class="notifications-container"></section>

  <main style="max-width: 400px; margin: 50px auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px;">
    <h1>Crea tu cuenta</h1>

    <form id="signup-form">
      <div>
        <label for="email">Email</label><br>
        <input id="email" name="email" type="email" required placeholder="ejemplo@correo.com">
      </div>
      
      <br>

      <div>
        <label for="password">Contraseña</label><br>
        <input id="password" name="password" type="password" minlength="6" required placeholder="Mínimo 6 caracteres">
      </div>

      <br>

      <div>
        <label for="password-confirm">Confirmar contraseña</label><br>
        <input id="password-confirm" name="password-confirm" type="password" minlength="6" required placeholder="Repite tu contraseña">
      </div>

      <br>

      <button type="submit" id="submit-button">Registrarse</button>
    </form>

    <p style="margin-top: 20px;">
      ¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a>
    </p>
    <p>
      <a href="index.html">Volver a la tienda</a>
    </p>
  </main>

  <script type="module" src="signup.js"></script>
</body>
</html>
